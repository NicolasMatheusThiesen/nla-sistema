<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vite App</title>
  <script>
  window.addEventListener('error', function(e) {
    document.body.innerHTML += '<div style=\"position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;font-size:20px;\">' + e.error.message + '<br>' + e.error.stack + '</div>';
  });
  window.addEventListener('unhandledrejection', function(e) {
    document.body.innerHTML += '<div style=\"position:fixed;top:50%;left:0;z-index:9999;background:red;color:white;padding:20px;font-size:20px;\">Unhandled Rejection: ' + e.reason + '</div>';
  });
</script></head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
